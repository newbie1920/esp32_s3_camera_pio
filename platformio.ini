; ============================================================
; PlatformIO Project - Hệ thống quản lý sân bóng rổ
; Board: ESP32-S3 N16R8 (16MB Flash, 8MB OPI PSRAM) với camera tích hợp
; ============================================================

[env:esp32-s3-n16r8]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino

; Cổng nạp - comment/bỏ comment tuỳ cổng COM của bạn
upload_port = COM6
monitor_port = COM6

; Tốc độ
monitor_speed = 115200
upload_speed  = 460800

; Quan trong: Ngan Monitor assert DTR/RTS -> GPIO0 bi keo xuong LOW -> board boot vao Download mode
monitor_rts = 0
monitor_dtr = 0

upload_flags =
    --before=default_reset
    --after=hard_reset

; ============ QUAN TRỌNG: Cấu hình Flash & PSRAM ============
board_build.arduino.memory_type = qio_opi   ; Bật OPI PSRAM (bắt buộc cho N16R8)
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv

; ============ Build flags ============
build_flags =
    ; -- Camera --
    -D BOARD_HAS_PSRAM

    ; -- MQTT --
    -D MQTT_MAX_PACKET_SIZE=512

    ; -- Tat Interrupt WDT (cai gay ra TG1WDT_SYS_RST) --
    ; Interrupt WDT khong the tat bang API, phai tat luc compile
    -D CONFIG_ESP_INT_WDT=0
    -D CONFIG_ESP_INT_WDT_TIMEOUT_MS=0

    ; -- Tang Task WDT timeout --
    -D CONFIG_ESP_TASK_WDT_TIMEOUT_S=60

; ============ Thư viện ============
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
